# Render Blueprint Configuration for Static Site
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: nuswaibah-portfolio
    runtime: static
    repo: https://github.com/nuswaibahnakanjako-web/nuswaibah
    branch: main
    buildCommand: echo "Static site - no build needed"
    staticPublishPath: ./
    envVars:
      - key: NODE_VERSION
        value: 18
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html